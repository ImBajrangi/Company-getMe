<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Inter', sans-serif;
    }

    canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }

    @keyframes rotateGlow {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    #morph-button {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 14px 28px;
        border-radius: 15px;
        overflow: hidden;
        text-align: center;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.95);
        background: rgba(25, 25, 25, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: transform 0.2s ease;
        cursor: pointer;
        user-select: none;
    }

    #morph-button:hover {
        transform: translateX(-50%) scale(1.05);
    }

    #morph-button:active {
        transform: translateX(-50%) scale(0.98);
        transition-duration: 0.1s;
    }

    #morph-button::before {
        content: '';
        position: absolute;
        inset: -4px;
        z-index: -1;
        /* background: conic-gradient(
            from 0deg,
            rgba(255,255,255,0) 0%,
            #ffffff 50%,
            rgba(255,255,255,0) 100%
        ); */
        filter: blur(8px);
        border-radius: inherit;
        animation: rotateGlow 8s linear infinite;
    }

    /* Control centre panel */
    #control-center {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 20;
        width: 320px;
        max-width: calc(100% - 40px);
        background: rgba(20, 20, 20, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 12px;
        color: #fff;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        font-size: 13px;
        transition: width 200ms ease, height 200ms ease, opacity 200ms ease;
    }

    #control-center .cc-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
    }

    #control-center h3 {
        margin: 0;
        font-size: 14px;
    }

    #cc-toggle {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #fff;
        padding: 6px 8px;
        border-radius: 8px;
        cursor: pointer;
    }

    #cc-toggle:hover {
        transform: scale(1.03);
    }

    /* minimized (use specific selectors so later rules don't override) */
    #control-center.minimized {
        width: 56px !important;
        padding: 8px !important;
        height: 56px !important;
        overflow: hidden !important;
    }

    #control-center.minimized .cc-header {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
    }

    #control-center.minimized h3 {
        display: none !important;
    }

    #control-center.minimized .control-row,
    #control-center.minimized .control-actions {
        display: none !important;
        pointer-events: none !important;
        opacity: 0 !important;
    }

    #control-center.minimized #cc-toggle {
        transform: none !important;
    }

    #control-center.minimized {
        cursor: default;
    }

    .control-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0;
    }

    .control-row label {
        flex: 1;
        min-width: 80px;
    }

    .control-row input[type="range"] {
        flex: 1;
    }

    .control-row input[type="number"] {
        width: 80px;
    }

    .control-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    .control-actions button {
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.08);
        cursor: pointer;
    }

    .control-actions button:hover {
        transform: scale(1.02);
    }

    .control-row input[type="checkbox"] {
        transform: scale(1.1);
    }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<div id="morph-button">
    Click to Morph
</div>

<div id="control-center">
    <div class="cc-header">
        <h3>Control Center</h3>
        <button id="cc-toggle" aria-label="Minimize">▾</button>
    </div>

    <div class="control-row">
        <label for="particlesRange">Particles</label>
        <input id="particlesRange" type="range" min="100" max="25000" step="50" value="900">
        <input id="particlesNumber" type="number" min="100" max="25000" step="50" value="900">
    </div>

    <div class="control-row">
        <label for="speedRange">Max Speed</label>
        <input id="speedRange" type="range" min="0.5" max="50" step="0.1" value="6">
    </div>

    <div class="control-row">
        <label for="forceRange">Max Force</label>
        <input id="forceRange" type="range" min="0.01" max="4" step="0.01" value="0.3">
    </div>

    <div class="control-row">
        <label for="sizeRange">Particle Size</label>
        <input id="sizeRange" type="range" min="0.2" max="30" step="0.1" value="2.5">
        <input id="sizeNumber" type="number" min="0.2" max="30" step="0.1" value="2.5">
    </div>

    <div class="control-row">
        <label for="morphRange">Morph Duration</label>
        <input id="morphRange" type="range" min="10" max="120" step="5" value="45">
        <input id="morphNumber" type="number" min="10" max="120" step="5" value="45">
    </div>

    <div class="control-row">
        <label for="hueRange">Base Hue</label>
        <input id="hueRange" type="range" min="0" max="360" step="1" value="200">
    </div>

    <div class="control-row">
        <label for="autoHue">Auto Hue</label>
        <input id="autoHue" type="checkbox">
        <input id="autoHueSpeed" type="range" min="0" max="5" step="0.1" value="0.6" style="flex:1;margin-left:8px">
    </div>

    <div class="control-row">
        <label for="bgAlphaRange">BG Alpha</label>
        <input id="bgAlphaRange" type="range" min="0" max="1" step="0.01" value="0.25">
    </div>

    <div class="control-row">
        <label for="idleRange">Idle Motion</label>
        <input id="idleRange" type="range" min="0" max="1" step="0.05" value="0.2">
        <input id="idleNumber" type="number" min="0" max="1" step="0.05" value="0.2">
    </div>

    <div class="control-row">
        <label for="autoMorph">Auto Morph</label>
        <input id="autoMorph" type="checkbox">
    </div>

    <div class="control-actions">
        <button id="btnPause">Pause</button>
        <button id="btnReset">Reset</button>
        <button id="btnToCircle">Circle</button>
        <button id="btnToSquare">Square</button>
        <button id="btnToTriangle">Triangle</button>
        <button id="btnToStar">Star</button>
        <button id="btnPerfectMorph">Perfect</button>
        <label style="display:flex;align-items:center;gap:6px;margin-left:6px;">Perfect Morph <input id="perfectMorph"
                type="checkbox" style="transform:scale(1.05);margin-left:6px"></label>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<script>
    // reduced default count for smoother performance on smaller devices
    let PARTICLES_COUNT = 900;
    let MAX_SPEED = 6.0;
    let MAX_FORCE = 0.3;
    let MORPH_DURATION = 45;

    let isPaused = false;
    let lastAutoMorphTime = 0;
    let autoMorphInterval = 4000; // ms

    const settings = {
        particleCount: PARTICLES_COUNT,
        maxSpeed: MAX_SPEED,
        maxForce: MAX_FORCE,
        morphDuration: MORPH_DURATION,
        baseHue: 200,
        bgAlpha: 0.25,
        particleSize: 2.5,
        idleMotion: 0.2,
        autoHue: false,
        autoHueSpeed: 0.6,
        autoMorph: false,
        perfectMorph: false
    };


    const CIRCLE = 0;
    const SQUARE = 1;
    const TRIANGLE = 2;
    const STAR = 3;
    const TOTAL_SHAPES = 4;

    let particles = [];
    let SHAPE_RADIUS;

    let currentShape = 0;
    let targetShape = 0;
    let isMorphing = false;
    let morphFrame = 0;
    let perfectMorphTriggered = false; // one-shot perfect morph


    class Particle {
        constructor() {
            this.pos = createVector();
            this.vel = createVector();
            this.acc = createVector();
            this.prevPos = createVector();
            this.updateSize();
            this.updateLimits();
        }

        updateLimits() {
            // Store speed/force as percentages so they scale with global settings
            if (!this.speedRatio) this.speedRatio = random(0.3, 1.0);
            if (!this.forceRatio) this.forceRatio = random(0.3, 1.0);
            this.maxSpeed = MAX_SPEED * this.speedRatio;
            this.maxForce = MAX_FORCE * this.forceRatio;
        }

        updateSize() {
            this.size = random(0.5, settings.particleSize);
        }

        seek(target) {
            let desired = p5.Vector.sub(target, this.pos);
            desired.setMag(this.maxSpeed);
            let steer = p5.Vector.sub(desired, this.vel);
            steer.limit(this.maxForce);
            this.applyForce(steer);
        }

        applyForce(force) {
            this.acc.add(force);
        }

        update() {
            this.vel.add(this.acc);
            this.vel.limit(this.maxSpeed);
            this.pos.add(this.vel);
            this.acc.mult(0);
        }

        draw() {
            const speed = this.vel.mag();
            const brightness = map(speed, 0, this.maxSpeed, 70, 100);
            const alpha = map(speed, 0, this.maxSpeed, 0.3, 0.95);
            const weight = map(speed, 0, this.maxSpeed, this.size * 0.5, this.size * 1.5);
            const hue = (settings.baseHue + speed * 10) % 360;

            stroke(hue, 80, brightness, alpha);
            strokeWeight(weight);

            // Draw trail line
            line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);

            // Draw point at current position for visibility at high speeds
            point(this.pos.x, this.pos.y);

            this.prevPos.set(this.pos);
        }
    }

    function getCirclePos(angle, radius) {
        return createVector(cos(angle) * radius, sin(angle) * radius);
    }

    function getSquarePos(angle, radius) {
        // Parameterize square perimeter (side length = 2*radius)
        let u = (angle % TWO_PI) / TWO_PI;
        if (u < 0) u += 1;
        let t = u * 4;
        let side = floor(t);
        let frac = t - side;
        let x = 0, y = 0;
        switch (side) {
            case 0: x = lerp(-radius, radius, frac); y = -radius; break;
            case 1: x = radius; y = lerp(-radius, radius, frac); break;
            case 2: x = lerp(radius, -radius, frac); y = radius; break;
            case 3: x = -radius; y = lerp(radius, -radius, frac); break;
        }
        return createVector(x, y);
    }

    function getTrianglePos(angle, radius) {
        angle -= PI / 2;
        let a = angle % TWO_PI;
        if (a < 0) a += TWO_PI;

        const sideIndex = floor(a / (TWO_PI / 3));
        const angleOnSide = a % (TWO_PI / 3);

        const p1 = createVector(cos(sideIndex * TWO_PI / 3), sin(sideIndex * TWO_PI / 3)).mult(radius);
        const p2 = createVector(cos((sideIndex + 1) * TWO_PI / 3), sin((sideIndex + 1) * TWO_PI / 3)).mult(radius);

        return p5.Vector.lerp(p1, p2, angleOnSide / (TWO_PI / 3));
    }

    function getStarPos(angle, radius) {
        const outer = radius;
        const inner = radius * 0.5;
        const points = 5;
        let u = (angle % TWO_PI) / TWO_PI;
        if (u < 0) u += 1;
        let idx = floor(u * points * 2);
        let frac = (u * points * 2) - idx;
        let r1 = (idx % 2 === 0) ? outer : inner;
        let r2 = ((idx + 1) % 2 === 0) ? outer : inner;
        let a1 = (idx / (points * 2)) * TWO_PI - PI / 2;
        let a2 = ((idx + 1) / (points * 2)) * TWO_PI - PI / 2;
        let p1 = createVector(cos(a1) * r1, sin(a1) * r1);
        let p2 = createVector(cos(a2) * r2, sin(a2) * r2);
        return p5.Vector.lerp(p1, p2, frac);
    }

    function setup() {
        createCanvas(windowWidth, windowHeight);
        // support high-DPI displays but cap to 2 for performance
        pixelDensity(min(window.devicePixelRatio || 1, 2));
        colorMode(HSB, 360, 100, 100, 1);
        strokeCap(ROUND);
        background(0);
        SHAPE_RADIUS = min(width, height) * 0.3;

        for (let i = 0; i < PARTICLES_COUNT; i++) {
            let p = new Particle();
            p.pos.set(random(-width / 2, width / 2), random(-height / 2, height / 2));
            // give a small initial velocity so motion is immediately visible
            p.vel.set(random(-0.6, 0.6), random(-0.6, 0.6));
            // set previous position just behind current position for visible trail
            p.prevPos.set(p.pos.x - p.vel.x, p.pos.y - p.vel.y);
            particles.push(p);
        }

        const morphButton = document.getElementById('morph-button');
        morphButton.addEventListener('click', () => {
            if (!isMorphing) {
                isMorphing = true;
                morphFrame = 0;
                targetShape = (currentShape + 1) % TOTAL_SHAPES;
            }
        });
    }

    function draw() {
        background(0, 0, 0, settings.bgAlpha);
        translate(width / 2, height / 2);

        if (settings.autoMorph) {
            if (!lastAutoMorphTime) lastAutoMorphTime = millis();
            if (millis() - lastAutoMorphTime > autoMorphInterval) {
                lastAutoMorphTime = millis();
                if (!isMorphing) {
                    isMorphing = true;
                    morphFrame = 0;
                    targetShape = (currentShape + 1) % TOTAL_SHAPES;
                }
            }
        }

        if (isMorphing) {
            morphFrame++;
            if (morphFrame >= MORPH_DURATION) {
                isMorphing = false;
                morphFrame = 0;
                currentShape = targetShape;
                // if this was a one-shot perfect morph, clear the trigger
                if (typeof perfectMorphTriggered !== 'undefined' && perfectMorphTriggered) {
                    perfectMorphTriggered = false;
                }
            }
        }

        let totalSpeed = 0;
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            const angle = map(i, 0, particles.length, 0, TWO_PI);

            const fromShapePos = getShapePosition(currentShape, angle, SHAPE_RADIUS);
            let targetPos;

            if (isMorphing) {
                const toShapePos = getShapePosition(targetShape, angle, SHAPE_RADIUS);
                const easedProgress = easeInOutCubic(morphFrame / MORPH_DURATION);
                targetPos = p5.Vector.lerp(fromShapePos, toShapePos, easedProgress);
            } else {
                targetPos = fromShapePos;
            }

            // apply subtle idle jitter so particles keep moving even when settled
            const t = millis() * 0.001;
            const jitterFactor = settings.idleMotion || 0;
            const perfectModeActive = settings.perfectMorph || perfectMorphTriggered;
            if (jitterFactor > 0 && !perfectModeActive) {
                const scale = SHAPE_RADIUS * 0.04 * jitterFactor;
                const jx = (noise(i * 0.01, t * 0.6) - 0.5) * 2 * scale;
                const jy = (noise(i * 0.02 + 100, t * 0.6) - 0.5) * 2 * scale;
                targetPos.add(jx, jy);
            }

            // small random nudges when completely idle to keep them visibly moving
            if (!isMorphing && (settings.idleMotion === 0 || settings.idleMotion < 0.01)) {
                if (random() < 0.01) p.applyForce(createVector(random(-0.04, 0.04), random(-0.04, 0.04)));
            }

            if (!isPaused) {
                p.seek(targetPos, perfectModeActive);
                p.update();
            }
            p.draw();

            totalSpeed += p.vel.mag();
        }

        // auto hue cycling
        if (settings.autoHue) {
            // deltaTime is in milliseconds
            const deltaHue = (settings.autoHueSpeed || 0.6) * (deltaTime / 1000);
            settings.baseHue = (settings.baseHue + deltaHue * 60) % 360; // scale for pleasant speed
        }

        // overlay with debug stats (particle count / average speed)
        const avgSpeed = particles.length ? (totalSpeed / particles.length) : 0;
        push();
        resetMatrix();
        noStroke();
        colorMode(RGB, 255);
        fill(0, 0, 0, 160);
        rect(10, 10, 220, 46, 8);
        fill(255, 255, 255);
        textSize(12);
        textAlign(LEFT, TOP);
        text(`Particles: ${particles.length}`, 18, 14);
        text(`Avg speed: ${avgSpeed.toFixed(2)}`, 18, 30);
        pop();
        colorMode(HSB, 360, 100, 100, 1);
    }

    function getShapePosition(shape, angle, radius) {
        switch (shape) {
            case CIRCLE: return getCirclePos(angle, radius);
            case SQUARE: return getSquarePos(angle, radius);
            case TRIANGLE: return getTrianglePos(angle, radius);
            case STAR: return getStarPos(angle, radius);
            default: return createVector(0, 0);
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        SHAPE_RADIUS = min(width, height) * 0.3;
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            const angle = map(i, 0, particles.length, 0, TWO_PI);
            const resetPos = getShapePosition(currentShape, angle, SHAPE_RADIUS);
            p.pos.set(resetPos);
            p.prevPos.set(resetPos);
        }
        background(0);
    }

    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - pow(-2 * t + 2, 3) / 2;
    }

    // ---------- Control Center Helpers ----------
    function setParticleCount(n) {
        n = Math.max(100, Math.min(25000, Math.round(n / 50) * 50));
        if (n === PARTICLES_COUNT) return;
        if (n > PARTICLES_COUNT) {
            const toAdd = n - PARTICLES_COUNT;
            for (let i = 0; i < toAdd; i++) {
                let p = new Particle();
                const angle = map(particles.length, 0, n, 0, TWO_PI);
                const pos = getShapePosition(currentShape, angle, SHAPE_RADIUS);
                p.pos.set(pos);
                p.prevPos.set(pos);
                particles.push(p);
            }
        } else {
            particles.length = n;
        }
        PARTICLES_COUNT = n;
    }

    function setMorphDuration(d) { MORPH_DURATION = d; settings.morphDuration = d; }
    function setSpeed(s) { MAX_SPEED = s; settings.maxSpeed = s; particles.forEach(p => p.updateLimits()); }
    function setForce(f) { MAX_FORCE = f; settings.maxForce = f; particles.forEach(p => p.updateLimits()); }
    function setParticleSize(s) { settings.particleSize = s; particles.forEach(p => p.updateSize()); }

    function resetParticles() {
        for (let i = 0; i < particles.length; i++) {
            const angle = map(i, 0, particles.length, 0, TWO_PI);
            const pos = getShapePosition(currentShape, angle, SHAPE_RADIUS);
            particles[i].pos.set(pos);
            particles[i].prevPos.set(pos);
            particles[i].vel.mult(0);
        }
    }

    function changeShapeTo(shapeIndex) {
        if (shapeIndex === currentShape) return;
        targetShape = shapeIndex;
        isMorphing = true;
        morphFrame = 0;
    }

    function initControlCenter() {
        const el = id => document.getElementById(id);
        const particlesRange = el('particlesRange');
        const particlesNumber = el('particlesNumber');
        const speedRange = el('speedRange');
        const forceRange = el('forceRange');
        const sizeRange = el('sizeRange');
        const sizeNumber = el('sizeNumber');
        const morphRange = el('morphRange');
        const morphNumber = el('morphNumber');
        const hueRange = el('hueRange');
        const autoHueCheckbox = el('autoHue');
        const autoHueSpeed = el('autoHueSpeed');
        const bgAlphaRange = el('bgAlphaRange');
        const autoMorphEl = el('autoMorph');

        autoHueCheckbox.addEventListener('change', (e) => { settings.autoHue = e.target.checked; });
        autoHueSpeed.addEventListener('input', (e) => { settings.autoHueSpeed = parseFloat(e.target.value); });


        particlesRange.addEventListener('input', (e) => { particlesNumber.value = e.target.value; setParticleCount(parseInt(e.target.value)); });
        particlesNumber.addEventListener('change', (e) => { particlesRange.value = e.target.value; setParticleCount(parseInt(e.target.value)); });

        speedRange.addEventListener('input', (e) => { setSpeed(parseFloat(e.target.value)); });
        forceRange.addEventListener('input', (e) => { setForce(parseFloat(e.target.value)); });

        sizeRange.addEventListener('input', (e) => { sizeNumber.value = e.target.value; setParticleSize(parseFloat(e.target.value)); });
        sizeNumber.addEventListener('change', (e) => { sizeRange.value = e.target.value; setParticleSize(parseFloat(e.target.value)); });

        morphRange.addEventListener('input', (e) => { morphNumber.value = e.target.value; setMorphDuration(parseInt(e.target.value)); });
        morphNumber.addEventListener('change', (e) => { morphRange.value = e.target.value; setMorphDuration(parseInt(e.target.value)); });

        hueRange.addEventListener('input', (e) => { settings.baseHue = parseInt(e.target.value); });
        bgAlphaRange.addEventListener('input', (e) => { settings.bgAlpha = parseFloat(e.target.value); });

        autoMorphEl.addEventListener('change', (e) => { settings.autoMorph = e.target.checked; if (settings.autoMorph) lastAutoMorphTime = millis(); });

        el('btnPause').addEventListener('click', () => {
            isPaused = !isPaused;
            el('btnPause').textContent = isPaused ? 'Resume' : 'Pause';
        });

        // perfect morph controls
        const perfectCheckbox = el('perfectMorph');
        const btnPerfect = el('btnPerfectMorph');
        perfectCheckbox.addEventListener('change', (e) => { settings.perfectMorph = e.target.checked; });
        btnPerfect.addEventListener('click', () => {
            // trigger a one-shot perfect morph to next shape
            perfectMorphTriggered = true;
            if (!isMorphing) {
                isMorphing = true;
                morphFrame = 0;
                targetShape = (currentShape + 1) % TOTAL_SHAPES;
            }
        });

        // Add idle motion controls
        const idleRange = el('idleRange');
        const idleNumber = el('idleNumber');
        idleRange.addEventListener('input', (e) => { idleNumber.value = e.target.value; settings.idleMotion = parseFloat(e.target.value); });
        idleNumber.addEventListener('change', (e) => { idleRange.value = e.target.value; settings.idleMotion = parseFloat(e.target.value); });

        // initialize controls with defaults
        particlesRange.value = PARTICLES_COUNT; particlesNumber.value = PARTICLES_COUNT;
        speedRange.value = MAX_SPEED; forceRange.value = MAX_FORCE;
        sizeRange.value = settings.particleSize; sizeNumber.value = settings.particleSize;
        morphRange.value = MORPH_DURATION; morphNumber.value = MORPH_DURATION;
        idleRange.value = settings.idleMotion; idleNumber.value = settings.idleMotion;
        hueRange.value = settings.baseHue; autoHueCheckbox.checked = settings.autoHue; autoHueSpeed.value = settings.autoHueSpeed;
        bgAlphaRange.value = settings.bgAlpha;
        autoMorphEl.checked = settings.autoMorph; perfectCheckbox.checked = settings.perfectMorph;



        // minimise / restore
        const ccToggle = el('cc-toggle');
        const controlCenter = el('control-center');
        function setMinimizedState(v) {
            const contentEls = controlCenter.querySelectorAll('.control-row, .control-actions, h3');
            if (v) {
                controlCenter.classList.add('minimized');
                ccToggle.textContent = '▸';
                ccToggle.setAttribute('aria-pressed', 'true');
                // force inline styles so nothing can override visibility
                controlCenter.style.width = '56px';
                controlCenter.style.height = '56px';
                controlCenter.style.padding = '8px';
                contentEls.forEach(el => {
                    el.style.display = 'none';
                    el.style.pointerEvents = 'none';
                    el.style.opacity = '0';
                    el.setAttribute('aria-hidden', 'true');
                });
            } else {
                controlCenter.classList.remove('minimized');
                ccToggle.textContent = '▾';
                ccToggle.setAttribute('aria-pressed', 'false');
                controlCenter.style.width = '';
                controlCenter.style.height = '';
                controlCenter.style.padding = '';
                contentEls.forEach(el => {
                    el.style.display = '';
                    el.style.pointerEvents = '';
                    el.style.opacity = '';
                    el.removeAttribute('aria-hidden');
                });
            }
            try { localStorage.setItem('pm_cc_min', v ? '1' : '0'); } catch (e) { /* ignore */ }
        }
        ccToggle.addEventListener('click', (e) => { e.stopPropagation(); setMinimizedState(!controlCenter.classList.contains('minimized')); });
        // keyboard accessibility for toggle (Enter/Space) — defined after ccToggle exists
        ccToggle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); setMinimizedState(!controlCenter.classList.contains('minimized')); }
        });
        // allow clicking the small minimized panel to restore it (but ignore clicks on toggle itself)
        controlCenter.addEventListener('click', (ev) => {
            // if the click is on the minimized container area (not on visible toggle), restore
            if (controlCenter.classList.contains('minimized') && ev.target.id !== 'cc-toggle') {
                setMinimizedState(false);
            }
        });
        // restore state from previous session (use setMinimizedState)
        try {
            const saved = localStorage.getItem('pm_cc_min');
            if (saved === '1') { setMinimizedState(true); }
        } catch (e) { /* ignore */ }
        el('btnReset').addEventListener('click', () => { resetParticles(); });

        el('btnToCircle').addEventListener('click', () => changeShapeTo(CIRCLE));
        el('btnToSquare').addEventListener('click', () => changeShapeTo(SQUARE));
        el('btnToTriangle').addEventListener('click', () => changeShapeTo(TRIANGLE));
        el('btnToStar').addEventListener('click', () => changeShapeTo(STAR));


    }

    // kickstart control center
    initControlCenter();
</script>
