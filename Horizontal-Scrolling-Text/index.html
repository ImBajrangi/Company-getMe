<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Modern Rounded Vrindopnishad Favicon -->
          <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizontal Scrolling Text</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Playfair+Display:wght@400;700;900&family=Oswald:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/SplitText.min.js"></script>
  <!-- Global Vrindopnishad Favicon -->
  <link rel="icon" href="https://vrindopnishad.in/favicon.ico" sizes="48x48">
  <link rel="icon" href="https://vrindopnishad.in/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="https://vrindopnishad.in/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="https://vrindopnishad.in/apple-touch-icon.png">
</head>
<style>
  :root {
    --font-sans: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
    --font-display: 'Oswald', 'Bebas Neue', Impact, sans-serif;
    --color-text: #111111;
    --color-background: #ffffff;
  }

  html,
  body {
    height: 100%;
    margin: 0;
    background: var(--color-background);
    color: var(--color-text);
    font-family: var(--font-sans);
  }

  .Horizontal {
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
  }

  .container {
    width: 100%;
    padding: 0 5vw;
  }

  .Horizontal__text {
    display: flex;
    width: max-content;
    white-space: nowrap;
    gap: 1.2vw;
    /* reduced gap for tighter spacing */
    padding-left: 15vw;
    /* smaller initial offset so text is more visible */
    transform: translateZ(0);
    align-items: center;
  }

  .heading-xl {
    font-size: clamp(2.5rem, 10vw, 8rem);
    font-weight: 600;
    line-height: 1.05;
    margin: 0;
  }

  .segment {
    display: inline-block;
    white-space: nowrap;
  }

  /* font helpers */
  .font-primary {
    font-family: var(--font-sans);
  }

  .font-accent {
    font-family: var(--font-serif);
    font-weight: 700;
  }

  .font-display {
    font-family: var(--font-display);
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: none;
  }

  .font-strong {
    font-weight: 800;
  }

  .char {
    display: inline-block;
    vertical-align: middle;
    will-change: transform, opacity;
  }
</style>

<body>
  <section class="Horizontal">
    <div class="container">
      <h3 class="Horizontal__text heading-xl">
        <span class="segment font-primary">The containerAnimation property allows us to</span>&#8203;<span
          class="segment font-accent font-strong">create ScrollTriggered</span>&#8203;<span
          class="segment font-primary">animations within a</span>&#8203;<span
          class="segment font-display font-strong">container</span>&#8203;<span class="segment font-primary">that's
          animated horizontally. It's like having nested</span>&#8203;<span
          class="segment font-accent font-strong">ScrollTriggers!</span>
      </h3>
    </div>
    <script>
      // Register ScrollTrigger safely (SplitText may be unavailable on CDN)
      if (typeof ScrollTrigger !== 'undefined') gsap.registerPlugin(ScrollTrigger);

      const wrapper = document.querySelector(".Horizontal");
      const text = document.querySelector(".Horizontal__text");

      function splitToChars(el) {
        if (typeof SplitText !== 'undefined') {
          // Use SplitText if available (preserves nested element classes)
          return new SplitText(el, { type: 'chars, words' }).chars;
        }

        // Fallback: preserve existing markup (segments) while splitting into .char spans
        const nodes = Array.from(el.childNodes);
        el.innerHTML = '';
        nodes.forEach(node => {
          if (node.nodeType === Node.TEXT_NODE) {
            const frag = document.createDocumentFragment();
            node.textContent.split('').forEach(ch => {
              const span = document.createElement('span');
              span.className = 'char';
              span.innerHTML = ch === ' ' ? '&nbsp;' : ch;
              frag.appendChild(span);
            });
            el.appendChild(frag);
          } else if (node.nodeType === Node.ELEMENT_NODE) {
            const wrapper = document.createElement('span');
            // preserve existing classes (e.g., font-accent)
            wrapper.className = (node.className ? node.className + ' ' : '') + 'segment';
            node.textContent.split('').forEach(ch => {
              const span = document.createElement('span');
              span.className = 'char';
              span.innerHTML = ch === ' ' ? '&nbsp;' : ch;
              wrapper.appendChild(span);
            });
            el.appendChild(wrapper);
          }
        });

        return el.querySelectorAll('.char');
      }

      if (wrapper && text) {
        const chars = splitToChars(text);

        const scrollTween = gsap.to(text, {
          xPercent: -100,
          ease: "none",
          scrollTrigger: {
            trigger: wrapper,
            pin: true,
            end: "+=5000px",
            scrub: true
          }
        });

        chars.forEach((char) => {
          gsap.from(char, {
            yPercent: gsap.utils.random(-200, 200),
            rotation: gsap.utils.random(-20, 20),
            ease: "back.out(1.2)",
            scrollTrigger: {
              trigger: char,
              containerAnimation: scrollTween,
              start: "left 100%",
              end: "left 30%",
              scrub: 1
            }
          });
        });
      }
    </script>
  </section>
</body>

</html>
